<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>og-template — ai-uketsuke-lp (1200x630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#333}
  .og{
    width:1200px;height:630px;position:relative;overflow:hidden;box-sizing:border-box;
    background:linear-gradient(160deg,#123f37,#0b2b26);
    font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    color:#fff;display:flex;flex-direction:column;justify-content:center;
    padding:0 96px;
  }
  .og::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 80% 0%,rgba(127,212,191,.18),transparent 60%)}
  .eyebrow{
    position:relative;z-index:1;color:#7fd4bf;font-size:26px;font-weight:700;letter-spacing:.18em;
    display:flex;align-items:center;gap:18px;margin-bottom:36px;
  }
  .eyebrow::before{content:"";width:46px;height:2px;background:currentColor;opacity:.7}
  h1{
    position:relative;z-index:1;margin:0;font-size:76px;font-weight:700;line-height:1.32;
    letter-spacing:.02em;font-feature-settings:"palt";
  }
  h1 .ph{display:inline-block}
  h1 .hl{background:linear-gradient(transparent 62%,rgba(127,212,191,.28) 62%);padding:0 .05em}
  .sub{position:relative;z-index:1;margin-top:34px;font-size:30px;font-weight:500;color:#dcebe6;letter-spacing:.03em}
  .brand{
    position:absolute;right:48px;bottom:36px;z-index:1;
    font-size:24px;font-weight:700;color:#9fc4bb;letter-spacing:.08em;
  }
</style>
</head>
<body>
<div class="og">
  <div class="eyebrow">AI受付付きホームページ制作・運用</div>
  <h1><span class="ph">施術中に取り逃した電話を、</span><br><span class="ph"><span class="hl">AIが24時間</span>拾います。</span></h1>
  <div class="sub">制作も運用も100%代行 ／ いつでも解約可・違約金なし</div>
  <div class="brand">NEXT GROWTH ／ BURNING BROS.</div>
</div>
</body>
</html>
